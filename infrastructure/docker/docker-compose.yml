version: "3.8"

services:

  backend:
    build:
      context: ../../backend
    ports:
      - "8080:8080"
    depends_on:
      - database

  database:
    image: postgres:16
    environment:
      POSTGRES_USER: dcp
      POSTGRES_PASSWORD: dcp_password
      POSTGRES_DB: dcp_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
